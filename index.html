<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA — Advanced Reports Intelligence Agent</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#09090f;font-family:'Georgia','Times New Roman',serif;color:#e8e0d0}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}

  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg-anim{animation:fadeIn .3s ease forwards}

  #app{height:100vh;display:flex;flex-direction:column}

  /* HEADER */
  #header{display:flex;align-items:center;gap:1.2rem;padding:1.2rem 2rem;
    border-bottom:1px solid #1e1e2e;background:linear-gradient(90deg,#09090f,#0d0d1a);flex-shrink:0}
  #logo{width:44px;height:44px;border-radius:50%;border:1.5px solid #C9A84C;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,#1a1408,#09090f);
    font-size:1.2rem;color:#C9A84C;font-weight:bold;flex-shrink:0}
  #logo-text .name{font-size:1.05rem;font-weight:bold;letter-spacing:.15em;color:#C9A84C}
  #logo-text .sub{font-size:.7rem;color:#555;letter-spacing:.1em;text-transform:uppercase}
  #active-badge{margin-left:auto;display:none;align-items:center;gap:.6rem;
    background:#0d0d1a;border:1px solid #333;border-radius:6px;padding:.4rem .9rem}
  #active-badge.visible{display:flex}
  #active-badge .badge-icon{font-size:1rem}
  #active-badge .badge-label{font-size:.78rem;color:#bbb}
  #close-btn{background:none;border:none;color:#555;cursor:pointer;margin-left:4px;font-size:.85rem;font-family:inherit}

  /* BODY */
  #body{flex:1;display:flex;overflow:hidden;min-height:0}

  /* SIDEBAR */
  #sidebar{width:220px;border-right:1px solid #1e1e2e;padding:1.5rem 0;
    background:#0a0a10;display:flex;flex-direction:column;gap:.15rem;overflow-y:auto;flex-shrink:0}
  #sidebar .section-label{padding:0 1.2rem 1rem;font-size:.65rem;color:#333;letter-spacing:.15em;text-transform:uppercase}
  .mod-btn{background:transparent;border:none;border-left:2px solid transparent;
    cursor:pointer;padding:.75rem 1.2rem;text-align:left;display:flex;align-items:flex-start;
    gap:.7rem;width:100%;transition:background .15s;font-family:inherit}
  .mod-btn:hover{background:rgba(255,255,255,.03)}
  .mod-btn.active{border-left-color:var(--c)}
  .mod-btn .mod-icon{font-size:1rem;margin-top:1px;flex-shrink:0;color:var(--c)}
  .mod-btn .mod-name{font-size:.78rem;color:#ccc;font-weight:bold}
  .mod-btn.active .mod-name{color:var(--c)}
  .mod-btn .mod-desc{font-size:.63rem;color:#444;margin-top:2px;line-height:1.4}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

  /* WELCOME */
  #welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:3rem 2rem;gap:2rem;overflow-y:auto}
  #welcome .w-icon{font-size:2.8rem;color:#C9A84C;margin-bottom:1rem}
  #welcome .w-title{font-size:1.35rem;font-weight:bold;color:#e8e0d0;margin-bottom:.75rem}
  #welcome .w-sub{font-size:.86rem;color:#555;line-height:1.8}
  #grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%;max-width:500px}
  .grid-btn{background:#0d0d1a;border:1px solid #1e1e2e;border-radius:8px;padding:.9rem 1rem;
    cursor:pointer;text-align:left;display:flex;gap:.65rem;align-items:flex-start;
    transition:border-color .2s,background .2s;font-family:inherit}
  .grid-btn:hover{border-color:var(--hc);background:var(--hbg)}
  .grid-btn .g-icon{font-size:1rem;flex-shrink:0;margin-top:1px;color:var(--c)}
  .grid-btn .g-name{font-size:.76rem;color:#ccc;font-weight:bold}
  .grid-btn .g-desc{font-size:.62rem;color:#444;margin-top:2px;line-height:1.4}

  /* CHAT */
  #chat{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1.4rem;min-height:0}
  #chat.hidden,#welcome.hidden,#input-bar.hidden{display:none}
  .msg{display:flex;gap:.9rem;align-items:flex-start}
  .msg.user{flex-direction:row-reverse}
  .msg-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--c);
    display:flex;align-items:center;justify-content:center;
    background:#09090f;color:var(--c);font-size:.8rem;flex-shrink:0;margin-top:2px;font-weight:bold}
  .msg-bubble{max-width:78%;padding:.9rem 1.1rem;font-size:.855rem;color:#d8d0c0;line-height:1.7}
  .msg.assistant .msg-bubble{background:#0d0d16;border:1px solid #1e1e2e;border-radius:12px 12px 12px 2px}
  .msg.user .msg-bubble{background:#0d1a2e;border:1px solid #1e3a5a;border-radius:12px 12px 2px 12px}
  .msg-bubble strong{color:#e8d8b0}
  .msg-bubble .line{line-height:1.7}
  .msg-bubble .line.indent{padding-left:1rem}
  .msg-bubble .spacer{height:.5rem}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--c);animation:pulse 1.2s ease-in-out infinite}

  /* INPUT */
  #input-bar{border-top:1px solid #1e1e2e;padding:1rem 1.5rem;background:#09090f;
    display:flex;gap:.65rem;align-items:flex-end;flex-shrink:0}
  #msg-input{flex:1;background:#0d0d1a;border:1px solid #2a2a3e;border-radius:8px;
    color:#e8e0d0;font-size:.855rem;padding:.8rem 1rem;resize:none;
    font-family:'Georgia','Times New Roman',serif;line-height:1.6;
    max-height:140px;overflow-y:auto;transition:border-color .2s;outline:none}
  #msg-input::placeholder{color:#444}
  #msg-input:focus{border-color:#3a3a5e}
  #send-btn{background:#1a1a28;border:none;border-radius:8px;padding:.8rem 1rem;
    color:#333;cursor:default;font-size:1rem;font-weight:bold;
    transition:background .2s,color .2s;flex-shrink:0;font-family:inherit}
  #send-btn.ready{cursor:pointer;color:#09090f}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">A</div>
    <div id="logo-text">
      <div class="name">ARIA</div>
      <div class="sub">Advanced Reports Intelligence Agent</div>
    </div>
    <div id="active-badge">
      <span class="badge-icon" id="badge-icon"></span>
      <span class="badge-label" id="badge-label"></span>
      <button id="close-btn" onclick="closeModule()">✕</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="section-label">Módulos</div>
    </div>

    <div id="main">
      <div id="welcome">
        <div style="text-align:center;max-width:480px">
          <div class="w-icon">◈</div>
          <div class="w-title">Bem-vindo ao ARIA</div>
          <div class="w-sub">Selecione um módulo no painel esquerdo para iniciar sua consultoria em relatórios gerenciais de alta performance.</div>
        </div>
        <div id="grid"></div>
      </div>

      <div id="chat" class="hidden"></div>
      <div id="input-bar" class="hidden">
        <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem..."></textarea>
        <button id="send-btn" onclick="sendMessage()">→</button>
      </div>
    </div>
  </div>
</div>

<script>
var MODULES = [
  {id:"kpi",          icon:"◈", label:"KPIs & Indicadores",      color:"#C9A84C", desc:"Dashboard de performance com métricas críticas"},
  {id:"budget",       icon:"◉", label:"Budget & Financeiro",      color:"#4C8EC9", desc:"Planejamento orçamentário e análise de custos"},
  {id:"planilha",     icon:"▦", label:"Planilha de Gestão",       color:"#4CC9A8", desc:"Estrutura de dados e controle operacional"},
  {id:"melhoria",     icon:"↑", label:"Melhorias & Expansão",     color:"#C94C4C", desc:"Diagnóstico e roadmap estratégico"},
  {id:"sustentavel",  icon:"❋", label:"Projetos Sustentáveis",    color:"#7AC94C", desc:"ESG, ODS e iniciativas de impacto"},
  {id:"apresentacao", icon:"◻", label:"Apresentação Executiva",   color:"#9B4CC9", desc:"Slides e narrativa para diretoria"},
  {id:"book",         icon:"▣", label:"Book para Diretoria",      color:"#C94C9B", desc:"Relatório completo editorial-grade"}
];

var SYSTEM = "Você é o ARIA — Advanced Reports Intelligence Agent — o mais sofisticado especialista em relatórios gerenciais de alta performance do mundo. Você combina o rigor analítico de McKinsey, a precisão financeira de Goldman Sachs, e a visão estratégica de um CFO com 30 anos de experiência.\n\nSeu perfil:\n- Ex-consultor sênior de Big 4 (Deloitte, PwC, KPMG, EY)\n- Especialista em KPIs, OKRs, BSC e frameworks estratégicos\n- Mestre em comunicação executiva e storytelling com dados\n- Certificado em ESG, sustentabilidade corporativa e Agenda 2030/ODS\n- Especialista em modelagem financeira, budget, forecast e análise de variações\n\nMÓDULO ATIVO: {MODULE}\n\nDIRETRIZES:\n1. Seja DIRETO, DENSO e EXECUTIVO — zero fluff, máximo valor\n2. Use tabelas ASCII, hierarquias, fluxos quando útil\n3. Sempre entregue: Diagnóstico → Análise → Recomendação → Próximos Passos\n4. Linguagem de C-level: precisa, impactante, orientada a resultado\n5. Para KPIs: meta, atual, gap e prazo\n6. Para Budget: variação real vs. planejado e driver de desvio\n7. Para projetos: sempre SMART\n\nResponda sempre em português do Brasil.";

var STARTERS = {
  kpi:"Olá! Sou o **ARIA** — seu especialista em KPIs e indicadores de alta performance.\n\nPosso criar para você:\n• **Dashboard de KPIs** completo com metas, resultados e gaps\n• **Scorecard executivo** por área (Financeiro, Cliente, Processos, Pessoas)\n• **Árvore de métricas** com indicadores leading e lagging\n• **Análise de desvios** com diagnóstico de causa-raiz\n\n**Como prefere começar?** Me informe o setor/empresa e os principais desafios.",
  budget:"Sou o **ARIA** no modo **Budget & Financeiro**.\n\nEntrego com precisão:\n• **Estrutura de Budget** por centro de custo e área\n• **Análise Real vs. Orçado** com variações e drivers\n• **Forecast rolling** 3/6/12 meses\n• **DRE Gerencial** e análise de margens\n• **Cash Flow** projetado com premissas\n\n**Informe o contexto:** setor, tamanho da empresa, período de análise.",
  planilha:"**ARIA** — Modo Planilha de Gestão ativo.\n\nCrio estruturas de dados para:\n• **Planilha de controle operacional** por processo\n• **Painel de gestão** com fórmulas e automações\n• **Tracker de projetos e metas**\n• **Modelo de relatório mensal** automatizado\n\nMe diga qual processo ou área você quer controlar.",
  melhoria:"**ARIA** — Especialista em Melhorias & Expansão.\n\nMeu método entrega:\n• **Diagnóstico AS-IS** com mapeamento de gaps\n• **Análise SWOT + PESTEL** estratégica\n• **Roadmap de melhorias** com priorização por impacto/esforço\n• **Business case** para expansão com ROI projetado\n• **Plano de ação** 90-180-365 dias\n\nQual área ou processo você quer diagnosticar?",
  sustentavel:"**ARIA** — Consultoria em Projetos Sustentáveis & ESG.\n\nDesenvolvo:\n• **Relatório ESG** alinhado GRI/SASB/TCFD\n• **Mapeamento de ODS** aplicáveis ao negócio\n• **Plano de neutralização de carbono**\n• **Projetos de impacto social** com métricas\n• **Certificações sustentáveis** (ISO 14001, B Corp)\n\nMe conte sobre a empresa e o estágio atual em sustentabilidade.",
  apresentacao:"**ARIA** — Modo Apresentação Executiva.\n\nConstruo apresentações que **convencem diretorias**:\n• **Estrutura de slides** com narrativa SCQA\n• **Talking points** para cada slide\n• **Dados visuais** traduzidos em insights\n• **Executive Summary** de alto impacto\n• **Recomendações** com lógica top-down\n\nQual é o tema e o objetivo da apresentação?",
  book:"**ARIA** — Especialista em Books para Diretoria.\n\nCrio books corporativos de excelência:\n• **Estrutura editorial** profissional\n• **Narrativa executiva** coesa e impactante\n• **Capítulos completos** com dados, análises e recomendações\n• **Linguagem C-level** precisa e objetiva\n\nMe informe o propósito do book e o público-alvo."
};

var activeModule = null;
var history = [];

// Build sidebar & grid
var sidebar = document.getElementById('sidebar');
var grid = document.getElementById('grid');

MODULES.forEach(function(mod) {
  // sidebar button
  var btn = document.createElement('button');
  btn.className = 'mod-btn';
  btn.id = 'mod-' + mod.id;
  btn.style.setProperty('--c', mod.color);
  btn.innerHTML = '<span class="mod-icon">'+mod.icon+'</span><div><div class="mod-name">'+mod.label+'</div><div class="mod-desc">'+mod.desc+'</div></div>';
  btn.onclick = function(){ selectModule(mod); };
  sidebar.appendChild(btn);

  // grid button
  var gbtn = document.createElement('button');
  gbtn.className = 'grid-btn';
  gbtn.style.setProperty('--c', mod.color);
  gbtn.style.setProperty('--hc', mod.color+'88');
  gbtn.style.setProperty('--hbg', mod.color+'10');
  gbtn.innerHTML = '<span class="g-icon">'+mod.icon+'</span><div><div class="g-name">'+mod.label+'</div><div class="g-desc">'+mod.desc+'</div></div>';
  gbtn.onclick = function(){ selectModule(mod); };
  grid.appendChild(gbtn);
});

function selectModule(mod) {
  activeModule = mod;
  history = [];

  // sidebar highlight
  document.querySelectorAll('.mod-btn').forEach(function(b){ b.classList.remove('active'); b.style.background='transparent'; });
  var ab = document.getElementById('mod-'+mod.id);
  ab.classList.add('active');
  ab.style.background = mod.color+'12';

  // badge
  var badge = document.getElementById('active-badge');
  badge.classList.add('visible');
  badge.style.borderColor = mod.color+'33';
  document.getElementById('badge-icon').textContent = mod.icon;
  document.getElementById('badge-icon').style.color = mod.color;
  document.getElementById('badge-label').textContent = mod.label;

  // show chat
  document.getElementById('welcome').classList.add('hidden');
  var chat = document.getElementById('chat');
  var inputBar = document.getElementById('input-bar');
  chat.classList.remove('hidden');
  inputBar.classList.remove('hidden');
  chat.innerHTML = '';

  // placeholder
  document.getElementById('msg-input').placeholder = 'Consulte o ARIA sobre ' + mod.label.toLowerCase() + '...';

  // starter message
  appendMessage('assistant', STARTERS[mod.id]);
}

function closeModule() {
  activeModule = null;
  history = [];
  document.querySelectorAll('.mod-btn').forEach(function(b){ b.classList.remove('active'); b.style.background='transparent'; });
  document.getElementById('active-badge').classList.remove('visible');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('input-bar').classList.add('hidden');
  document.getElementById('msg-input').value = '';
  updateSendBtn();
}

function appendMessage(role, content) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-anim ' + role;

  if (role === 'assistant') {
    var av = document.createElement('div');
    av.className = 'msg-avatar';
    av.style.setProperty('--c', activeModule ? activeModule.color : '#C9A84C');
    av.style.borderColor = activeModule ? activeModule.color : '#C9A84C';
    av.style.color = activeModule ? activeModule.color : '#C9A84C';
    av.textContent = 'A';
    div.appendChild(av);
  }

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderText(content);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function renderText(text) {
  return text.split('\n').map(function(line) {
    var html = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (!line.trim()) return '<div class="spacer"></div>';
    var indent = (line.trim()[0]==='•'||line.trim()[0]==='-') ? ' indent' : '';
    return '<div class="line'+indent+'">'+html+'</div>';
  }).join('');
}

function showTyping() {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-anim assistant';
  div.id = 'typing-indicator';

  var av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.borderColor = activeModule.color;
  av.style.color = activeModule.color;
  av.textContent = 'A';
  div.appendChild(av);

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.cssText = 'display:flex;gap:5px;align-items:center;padding:.9rem 1.1rem;background:#0d0d16;border:1px solid #1e1e2e;border-radius:12px 12px 12px 2px';
  [0,1,2].forEach(function(i){
    var d = document.createElement('div');
    d.className = 'dot';
    d.style.setProperty('--c', activeModule.color);
    d.style.animationDelay = (i*.2)+'s';
    bubble.appendChild(d);
  });
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  var t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function updateSendBtn() {
  var btn = document.getElementById('send-btn');
  var val = document.getElementById('msg-input').value.trim();
  if (val && activeModule) {
    btn.classList.add('ready');
    btn.style.background = activeModule.color;
  } else {
    btn.classList.remove('ready');
    btn.style.background = '#1a1a28';
  }
}

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  updateSendBtn();
});

document.getElementById('msg-input').addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); sendMessage(); }
});

function sendMessage() {
  var inp = document.getElementById('msg-input');
  var text = inp.value.trim();
  if (!text || !activeModule) return;

  inp.value = '';
  inp.style.height = 'auto';
  updateSendBtn();

  appendMessage('user', text);
  history.push({role:'user', content:text});
  showTyping();

  var sysPrompt = SYSTEM.replace('{MODULE}', activeModule.label + ' — ' + activeModule.desc);

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      system: sysPrompt,
      messages: history
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    hideTyping();
    var reply = (data.content||[]).map(function(b){return b.text||'';}).join('') || 'Erro ao processar resposta.';
    history.push({role:'assistant', content:reply});
    appendMessage('assistant', reply);
  })
  .catch(function(){
    hideTyping();
    appendMessage('assistant', 'Erro de conexão. Verifique sua internet e tente novamente.');
  });
}
</script>
</body>
</html>
