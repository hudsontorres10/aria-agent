<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARIA — Advanced Reports Intelligence Agent</title>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#09090f;font-family:'Georgia','Times New Roman',serif;color:#e8e0d0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-anim{animation:fadeIn .3s ease forwards}
textarea{outline:none;font-family:'Georgia','Times New Roman',serif}
textarea::placeholder{color:#444}
textarea:focus{border-color:#3a3a5e !important}
.mod-btn:hover{background:rgba(255,255,255,.03) !important}
#app{height:100vh;display:flex;flex-direction:column}
#header{display:flex;align-items:center;gap:1.2rem;padding:1.2rem 2rem;border-bottom:1px solid #1e1e2e;background:linear-gradient(90deg,#09090f,#0d0d1a);flex-shrink:0}
#logo{width:44px;height:44px;border-radius:50%;border:1.5px solid #C9A84C;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#1a1408,#09090f);font-size:1.2rem;color:#C9A84C;font-weight:bold;flex-shrink:0}
#logo-text .name{font-size:1.05rem;font-weight:bold;letter-spacing:.15em;color:#C9A84C}
#logo-text .sub{font-size:.7rem;color:#555;letter-spacing:.1em;text-transform:uppercase}
#active-badge{margin-left:auto;display:none;align-items:center;gap:.6rem;background:#0d0d1a;border:1px solid #333;border-radius:6px;padding:.4rem .9rem}
#active-badge.visible{display:flex}
#close-btn{background:none;border:none;color:#555;cursor:pointer;margin-left:4px;font-size:.85rem;font-family:inherit}
#body{flex:1;display:flex;overflow:hidden;min-height:0}
#sidebar{width:220px;border-right:1px solid #1e1e2e;padding:1.5rem 0;background:#0a0a10;display:flex;flex-direction:column;gap:.15rem;overflow-y:auto;flex-shrink:0}
#sidebar .section-label{padding:0 1.2rem 1rem;font-size:.65rem;color:#333;letter-spacing:.15em;text-transform:uppercase}
.mod-btn{background:transparent;border:none;border-left:2px solid transparent;cursor:pointer;padding:.75rem 1.2rem;text-align:left;display:flex;align-items:flex-start;gap:.7rem;width:100%;transition:background .15s;font-family:inherit}
.mod-btn .mod-icon{font-size:1rem;margin-top:1px;flex-shrink:0;color:var(--c)}
.mod-btn .mod-name{font-size:.78rem;color:#ccc;font-weight:bold}
.mod-btn.active .mod-name{color:var(--c)}
.mod-btn .mod-desc{font-size:.63rem;color:#444;margin-top:2px;line-height:1.4}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:2rem;overflow-y:auto}
#grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;width:100%;max-width:500px}
.grid-btn{background:#0d0d1a;border:1px solid #1e1e2e;border-radius:8px;padding:.9rem 1rem;cursor:pointer;text-align:left;display:flex;gap:.65rem;align-items:flex-start;transition:border-color .2s,background .2s;font-family:inherit}
.grid-btn .g-icon{font-size:1rem;flex-shrink:0;margin-top:1px;color:var(--c)}
.grid-btn .g-name{font-size:.76rem;color:#ccc;font-weight:bold}
.grid-btn .g-desc{font-size:.62rem;color:#444;margin-top:2px;line-height:1.4}
#chat{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1.4rem;min-height:0}
#chat.hidden,#welcome.hidden,#input-area.hidden{display:none}
.msg{display:flex;gap:.9rem;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--c,#C9A84C);display:flex;align-items:center;justify-content:center;background:#09090f;color:var(--c,#C9A84C);font-size:.8rem;flex-shrink:0;margin-top:2px;font-weight:bold}
.msg-bubble{max-width:78%;padding:.9rem 1.1rem;font-size:.855rem;color:#d8d0c0;line-height:1.7}
.msg.assistant .msg-bubble{background:#0d0d16;border:1px solid #1e1e2e;border-radius:12px 12px 12px 2px}
.msg.user .msg-bubble{background:#0d1a2e;border:1px solid #1e3a5a;border-radius:12px 12px 2px 12px}
.msg-bubble strong{color:#e8d8b0}
.msg-bubble .line{line-height:1.7}
.msg-bubble .line.indent{padding-left:1rem}
.msg-bubble .spacer{height:.5rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--c,#C9A84C);animation:pulse 1.2s ease-in-out infinite}

/* File attachment pill */
.file-pill{display:inline-flex;align-items:center;gap:.5rem;background:#0d1a2e;border:1px solid #1e3a5a;border-radius:20px;padding:.3rem .8rem;font-size:.75rem;color:#8bb;margin-bottom:.5rem;max-width:100%;overflow:hidden}
.file-pill-icon{flex-shrink:0;font-size:.9rem}
.file-pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.file-pill-remove{background:none;border:none;color:#556;cursor:pointer;font-size:.8rem;padding:0;margin-left:2px;line-height:1;font-family:inherit}
.file-pill-remove:hover{color:#aaa}

/* Input area */
#input-area{border-top:1px solid #1e1e2e;background:#09090f;flex-shrink:0}
#file-preview{padding:.6rem 1.5rem 0;display:none;flex-wrap:wrap;gap:.4rem}
#file-preview.visible{display:flex}
#input-row{padding:1rem 1.5rem;display:flex;gap:.65rem;align-items:flex-end}
#msg-input{flex:1;background:#0d0d1a;border:1px solid #2a2a3e;border-radius:8px;color:#e8e0d0;font-size:.855rem;padding:.8rem 1rem;resize:none;line-height:1.6;max-height:140px;overflow-y:auto;transition:border-color .2s}
#attach-btn{background:#0d0d1a;border:1px solid #2a2a3e;border-radius:8px;padding:.8rem .9rem;color:#666;cursor:pointer;font-size:1rem;transition:border-color .2s,color .2s;flex-shrink:0;font-family:inherit}
#attach-btn:hover{border-color:#3a3a5e;color:#aaa}
#send-btn{background:#1a1a28;border:none;border-radius:8px;padding:.8rem 1rem;color:#333;cursor:default;font-size:1rem;font-weight:bold;transition:background .2s,color .2s;flex-shrink:0;font-family:inherit}
#send-btn.ready{cursor:pointer;color:#09090f}
#file-input{display:none}

/* Processing overlay */
#processing{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(9,9,15,.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
#processing.visible{display:flex}
#processing .proc-text{color:#C9A84C;font-size:.9rem;letter-spacing:.05em}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">A</div>
    <div id="logo-text">
      <div class="name">ARIA</div>
      <div class="sub">Advanced Reports Intelligence Agent</div>
    </div>
    <div id="active-badge">
      <span class="badge-icon" id="badge-icon"></span>
      <span class="badge-label" id="badge-label"></span>
      <button id="close-btn" onclick="closeModule()">✕</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="section-label">Módulos</div>
    </div>
    <div id="main">
      <div id="welcome">
        <div style="text-align:center;max-width:480px">
          <div style="font-size:2.8rem;color:#C9A84C;margin-bottom:1rem">◈</div>
          <div style="font-size:1.35rem;font-weight:bold;color:#e8e0d0;margin-bottom:.75rem">Bem-vindo ao ARIA</div>
          <div style="font-size:.86rem;color:#555;line-height:1.8">Selecione um módulo no painel esquerdo para iniciar sua consultoria em relatórios gerenciais de alta performance.</div>
        </div>
        <div id="grid"></div>
      </div>

      <div id="chat" class="hidden"></div>

      <div id="input-area" class="hidden">
        <div id="file-preview"></div>
        <div id="input-row">
          <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Anexar arquivo (PDF, Excel, Word)">📎</button>
          <input type="file" id="file-input" accept=".pdf,.xlsx,.xls,.csv,.docx,.doc" multiple onchange="handleFiles(this.files)"/>
          <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem ou anexe um arquivo..."></textarea>
          <button id="send-btn" onclick="sendMessage()">→</button>
        </div>
        <div style="padding:0 1.5rem .5rem;font-size:.65rem;color:#333">PDF · Excel · CSV · Word</div>
      </div>
    </div>
  </div>
</div>

<div id="processing">
  <div style="width:36px;height:36px;border-radius:50%;border:2px solid #C9A84C33;border-top-color:#C9A84C;animation:spin .8s linear infinite"></div>
  <div class="proc-text" id="proc-text">Lendo arquivo...</div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
// PDF.js worker
if(typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

var MODULES = [
  {id:"kpi",          icon:"◈", label:"KPIs & Indicadores",      color:"#C9A84C", desc:"Dashboard de performance com métricas críticas"},
  {id:"budget",       icon:"◉", label:"Budget & Financeiro",      color:"#4C8EC9", desc:"Planejamento orçamentário e análise de custos"},
  {id:"planilha",     icon:"▦", label:"Planilha de Gestão",       color:"#4CC9A8", desc:"Estrutura de dados e controle operacional"},
  {id:"melhoria",     icon:"↑", label:"Melhorias & Expansão",     color:"#C94C4C", desc:"Diagnóstico e roadmap estratégico"},
  {id:"sustentavel",  icon:"❋", label:"Projetos Sustentáveis",    color:"#7AC94C", desc:"ESG, ODS e iniciativas de impacto"},
  {id:"apresentacao", icon:"◻", label:"Apresentação Executiva",   color:"#9B4CC9", desc:"Slides e narrativa para diretoria"},
  {id:"book",         icon:"▣", label:"Book para Diretoria",      color:"#C94C9B", desc:"Relatório completo editorial-grade"}
];

var SYSTEM = "Você é o ARIA — Advanced Reports Intelligence Agent — o mais sofisticado especialista em relatórios gerenciais de alta performance do mundo. Você combina o rigor analítico de McKinsey, a precisão financeira de Goldman Sachs, e a visão estratégica de um CFO com 30 anos de experiência.\n\nSeu perfil:\n- Ex-consultor sênior de Big 4 (Deloitte, PwC, KKMG, EY)\n- Especialista em KPIs, OKRs, BSC e frameworks estratégicos\n- Mestre em comunicação executiva e storytelling com dados\n- Certificado em ESG, sustentabilidade corporativa e Agenda 2030/ODS\n- Especialista em modelagem financeira, budget, forecast e análise de variações\n\nMÓDULO ATIVO: {MODULE}\n\nDIRETRIZES:\n1. Seja DIRETO, DENSO e EXECUTIVO — zero fluff, máximo valor\n2. Use tabelas ASCII, hierarquias, fluxos quando útil\n3. Sempre entregue: Diagnóstico → Análise → Recomendação → Próximos Passos\n4. Linguagem de C-level: precisa, impactante, orientada a resultado\n5. Para KPIs: meta, atual, gap e prazo\n6. Para Budget: variação real vs. planejado e driver de desvio\n7. Para projetos: sempre SMART\n8. Quando receber conteúdo de arquivo, analise-o profundamente e entregue insights executivos relevantes ao módulo ativo.\n\nResponda sempre em português do Brasil.";

var STARTERS = {
  kpi:"Olá! Sou o **ARIA** — seu especialista em KPIs e indicadores de alta performance.\n\nPosso criar para você:\n• **Dashboard de KPIs** completo com metas, resultados e gaps\n• **Scorecard executivo** por área (Financeiro, Cliente, Processos, Pessoas)\n• **Árvore de métricas** com indicadores leading e lagging\n• **Análise de desvios** com diagnóstico de causa-raiz\n\nVocê pode digitar sua pergunta ou **anexar um arquivo** (PDF, Excel, Word) para análise.\n\n📎 Use o botão de clipe para anexar arquivos.",
  budget:"Sou o **ARIA** no modo **Budget & Financeiro**.\n\nEntrego com precisão:\n• **Estrutura de Budget** por centro de custo e área\n• **Análise Real vs. Orçado** com variações e drivers\n• **Forecast rolling** 3/6/12 meses\n• **DRE Gerencial** e análise de margens\n\nAnexe uma **planilha Excel ou CSV** com seus dados financeiros para análise imediata.\n\n📎 Use o botão de clipe para anexar arquivos.",
  planilha:"**ARIA** — Modo Planilha de Gestão ativo.\n\nCrio estruturas de dados para:\n• **Planilha de controle operacional** por processo\n• **Painel de gestão** com fórmulas e automações\n• **Tracker de projetos e metas**\n\nAnexe sua **planilha Excel/CSV** para eu analisar a estrutura atual e propor melhorias.\n\n📎 Use o botão de clipe para anexar arquivos.",
  melhoria:"**ARIA** — Especialista em Melhorias & Expansão.\n\nMeu método entrega:\n• **Diagnóstico AS-IS** com mapeamento de gaps\n• **Análise SWOT + PESTEL** estratégica\n• **Roadmap de melhorias** com priorização por impacto/esforço\n• **Plano de ação** 90-180-365 dias\n\nAnexe um **relatório ou documento Word/PDF** para diagnóstico profundo.\n\n📎 Use o botão de clipe para anexar arquivos.",
  sustentavel:"**ARIA** — Consultoria em Projetos Sustentáveis & ESG.\n\nDesenvolvo:\n• **Relatório ESG** alinhado GRI/SASB/TCFD\n• **Mapeamento de ODS** aplicáveis ao negócio\n• **Plano de neutralização de carbono**\n• **Certificações sustentáveis** (ISO 14001, B Corp)\n\nAnexe documentos existentes para análise e evolução do seu programa ESG.\n\n📎 Use o botão de clipe para anexar arquivos.",
  apresentacao:"**ARIA** — Modo Apresentação Executiva.\n\nConstruo apresentações que **convencem diretorias**:\n• **Estrutura de slides** com narrativa SCQA\n• **Executive Summary** de alto impacto\n• **Recomendações** com lógica top-down\n\nAnexe o **documento base** (Word, PDF ou Excel) e eu transformo em narrativa executiva.\n\n📎 Use o botão de clipe para anexar arquivos.",
  book:"**ARIA** — Especialista em Books para Diretoria.\n\nCrio books corporativos de excelência:\n• **Estrutura editorial** profissional\n• **Narrativa executiva** coesa e impactante\n• **Capítulos completos** com dados, análises e recomendações\n\nAnexe seus dados ou relatórios existentes para eu estruturar o book completo.\n\n📎 Use o botão de clipe para anexar arquivos."
};

var activeModule = null;
var history = [];
var pendingFiles = []; // [{name, content, type}]

// Build sidebar & grid
var sidebar = document.getElementById('sidebar');
var grid = document.getElementById('grid');

MODULES.forEach(function(mod) {
  var btn = document.createElement('button');
  btn.className = 'mod-btn';
  btn.id = 'mod-' + mod.id;
  btn.style.setProperty('--c', mod.color);
  btn.innerHTML = '<span class="mod-icon">'+mod.icon+'</span><div><div class="mod-name">'+mod.label+'</div><div class="mod-desc">'+mod.desc+'</div></div>';
  btn.onclick = function(){ selectModule(mod); };
  sidebar.appendChild(btn);

  var gbtn = document.createElement('button');
  gbtn.className = 'grid-btn';
  gbtn.style.setProperty('--c', mod.color);
  gbtn.innerHTML = '<span class="g-icon">'+mod.icon+'</span><div><div class="g-name">'+mod.label+'</div><div class="g-desc">'+mod.desc+'</div></div>';
  gbtn.onmouseenter = function(){ this.style.borderColor=mod.color+'88'; this.style.background=mod.color+'10'; };
  gbtn.onmouseleave = function(){ this.style.borderColor=''; this.style.background=''; };
  gbtn.onclick = function(){ selectModule(mod); };
  grid.appendChild(gbtn);
});

function selectModule(mod) {
  activeModule = mod;
  history = [];
  pendingFiles = [];

  document.querySelectorAll('.mod-btn').forEach(function(b){ b.classList.remove('active'); b.style.background='transparent'; });
  var ab = document.getElementById('mod-'+mod.id);
  ab.classList.add('active');
  ab.style.background = mod.color+'12';

  var badge = document.getElementById('active-badge');
  badge.classList.add('visible');
  badge.style.borderColor = mod.color+'33';
  document.getElementById('badge-icon').textContent = mod.icon;
  document.getElementById('badge-icon').style.color = mod.color;
  document.getElementById('badge-label').textContent = mod.label;

  document.getElementById('welcome').classList.add('hidden');
  var chat = document.getElementById('chat');
  chat.classList.remove('hidden');
  document.getElementById('input-area').classList.remove('hidden');
  chat.innerHTML = '';

  var sendBtn = document.getElementById('send-btn');
  sendBtn.style.background = '';

  appendMessage('assistant', STARTERS[mod.id]);
  updateSendBtn();
}

function closeModule() {
  activeModule = null;
  history = [];
  pendingFiles = [];
  document.querySelectorAll('.mod-btn').forEach(function(b){ b.classList.remove('active'); b.style.background='transparent'; });
  document.getElementById('active-badge').classList.remove('visible');
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('input-area').classList.add('hidden');
  document.getElementById('msg-input').value = '';
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('file-preview').classList.remove('visible');
  updateSendBtn();
}

// ── FILE HANDLING ─────────────────────────────────────────────────────

function showProcessing(text) {
  document.getElementById('proc-text').textContent = text || 'Lendo arquivo...';
  document.getElementById('processing').classList.add('visible');
}
function hideProcessing() {
  document.getElementById('processing').classList.remove('visible');
}

function handleFiles(files) {
  var arr = Array.from(files);
  document.getElementById('file-input').value = '';
  arr.forEach(function(file) { processFile(file); });
}

function processFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  showProcessing('Lendo ' + file.name + '...');

  if (ext === 'pdf') {
    readPDF(file);
  } else if (ext === 'xlsx' || ext === 'xls' || ext === 'csv') {
    readExcel(file);
  } else if (ext === 'docx' || ext === 'doc') {
    readWord(file);
  } else {
    hideProcessing();
    alert('Formato não suportado. Use PDF, Excel/CSV ou Word.');
  }
}

function readPDF(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = new Uint8Array(e.target.result);
    pdfjsLib.getDocument({data: data}).promise.then(function(pdf) {
      var pages = [];
      var total = Math.min(pdf.numPages, 30); // max 30 pages
      var done = 0;
      for (var i = 1; i <= total; i++) {
        (function(pageNum) {
          pdf.getPage(pageNum).then(function(page) {
            page.getTextContent().then(function(tc) {
              pages[pageNum-1] = tc.items.map(function(it){ return it.str; }).join(' ');
              done++;
              if (done === total) {
                var content = pages.join('\n\n');
                if (content.trim().length < 50) content = '[PDF com ' + pdf.numPages + ' páginas — conteúdo não extraível (pode ser imagem)]';
                addPendingFile(file.name, content, 'PDF');
                hideProcessing();
              }
            });
          });
        })(i);
      }
    }).catch(function(err) {
      hideProcessing();
      addPendingFile(file.name, '[Erro ao ler PDF: ' + err.message + ']', 'PDF');
    });
  };
  reader.readAsArrayBuffer(file);
}

function readExcel(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:'binary'});
      var result = [];
      wb.SheetNames.forEach(function(sheetName) {
        var ws = wb.Sheets[sheetName];
        var csv = XLSX.utils.sheet_to_csv(ws, {blankrows:false});
        if (csv.trim()) result.push('=== Aba: ' + sheetName + ' ===\n' + csv);
      });
      addPendingFile(file.name, result.join('\n\n'), 'Excel/CSV');
      hideProcessing();
    } catch(err) {
      hideProcessing();
      addPendingFile(file.name, '[Erro ao ler arquivo: ' + err.message + ']', 'Excel/CSV');
    }
  };
  reader.readAsBinaryString(file);
}

function readWord(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    mammoth.extractRawText({arrayBuffer: e.target.result}).then(function(result) {
      addPendingFile(file.name, result.value || '[Documento Word vazio]', 'Word');
      hideProcessing();
    }).catch(function(err) {
      hideProcessing();
      addPendingFile(file.name, '[Erro ao ler Word: ' + err.message + ']', 'Word');
    });
  };
  reader.readAsArrayBuffer(file);
}

function addPendingFile(name, content, type) {
  var id = 'f' + Date.now() + Math.random().toString(36).slice(2,6);
  pendingFiles.push({id: id, name: name, content: content, type: type});

  var preview = document.getElementById('file-preview');
  preview.classList.add('visible');

  var pill = document.createElement('div');
  pill.className = 'file-pill';
  pill.id = 'pill-' + id;
  var icon = type === 'PDF' ? '📄' : type === 'Word' ? '📝' : '📊';
  pill.innerHTML = '<span class="file-pill-icon">'+icon+'</span><span class="file-pill-name">'+name+'</span><button class="file-pill-remove" onclick="removePendingFile(\''+id+'\')">✕</button>';
  preview.appendChild(pill);

  updateSendBtn();
}

function removePendingFile(id) {
  pendingFiles = pendingFiles.filter(function(f){ return f.id !== id; });
  var pill = document.getElementById('pill-' + id);
  if (pill) pill.remove();
  if (pendingFiles.length === 0) {
    document.getElementById('file-preview').classList.remove('visible');
  }
  updateSendBtn();
}

// ── CHAT ─────────────────────────────────────────────────────────────

function appendMessage(role, content) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-anim ' + role;

  if (role === 'assistant') {
    var av = document.createElement('div');
    av.className = 'msg-avatar';
    var c = activeModule ? activeModule.color : '#C9A84C';
    av.style.borderColor = c;
    av.style.color = c;
    av.textContent = 'A';
    div.appendChild(av);
  }

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = renderText(content);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function appendUserMessage(text, files) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-anim user';

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // Show file pills in message
  if (files && files.length > 0) {
    files.forEach(function(f) {
      var icon = f.type === 'PDF' ? '📄' : f.type === 'Word' ? '📝' : '📊';
      var pill = document.createElement('div');
      pill.className = 'file-pill';
      pill.style.marginBottom = '.4rem';
      pill.innerHTML = '<span class="file-pill-icon">'+icon+'</span><span class="file-pill-name">'+f.name+'</span>';
      bubble.appendChild(pill);
    });
  }

  if (text) {
    bubble.innerHTML += renderText(text);
  }

  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function renderText(text) {
  return text.split('\n').map(function(line) {
    var html = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (!line.trim()) return '<div class="spacer"></div>';
    var indent = (line.trim()[0]==='•'||line.trim()[0]==='-') ? ' indent':'';
    return '<div class="line'+indent+'">'+html+'</div>';
  }).join('');
}

function showTyping() {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg msg-anim assistant';
  div.id = 'typing-indicator';
  var c = activeModule ? activeModule.color : '#C9A84C';
  var av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.borderColor = c; av.style.color = c;
  av.textContent = 'A';
  div.appendChild(av);
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.cssText = 'display:flex;gap:5px;align-items:center';
  [0,1,2].forEach(function(i){
    var d = document.createElement('div');
    d.className = 'dot';
    d.style.setProperty('--c', c);
    d.style.animationDelay = (i*.2)+'s';
    bubble.appendChild(d);
  });
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  var t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function updateSendBtn() {
  var btn = document.getElementById('send-btn');
  var val = document.getElementById('msg-input').value.trim();
  var hasFiles = pendingFiles.length > 0;
  var ready = (val || hasFiles) && activeModule;
  if (ready) {
    btn.classList.add('ready');
    btn.style.background = activeModule.color;
  } else {
    btn.classList.remove('ready');
    btn.style.background = '#1a1a28';
  }
}

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  updateSendBtn();
});
document.getElementById('msg-input').addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); sendMessage(); }
});

function sendMessage() {
  var inp = document.getElementById('msg-input');
  var text = inp.value.trim();
  var files = pendingFiles.slice();

  if ((!text && files.length === 0) || !activeModule) return;

  // Build user content for API
  var userContent = text;
  if (files.length > 0) {
    var fileBlock = files.map(function(f) {
      var maxChars = 12000;
      var content = f.content.length > maxChars ? f.content.slice(0, maxChars) + '\n\n[... conteúdo truncado para '+maxChars+' caracteres ...]' : f.content;
      return '=== ARQUIVO ANEXADO: ' + f.name + ' (' + f.type + ') ===\n' + content + '\n=== FIM DO ARQUIVO ===';
    }).join('\n\n');
    userContent = fileBlock + (text ? '\n\n' + text : '\n\nAnalise este arquivo e forneça insights executivos relevantes ao módulo ativo.');
  }

  // Clear input
  inp.value = '';
  inp.style.height = 'auto';
  pendingFiles = [];
  document.getElementById('file-preview').innerHTML = '';
  document.getElementById('file-preview').classList.remove('visible');
  updateSendBtn();

  // Show in chat
  appendUserMessage(text, files);
  history.push({role:'user', content: userContent});
  showTyping();

  var sysPrompt = SYSTEM.replace('{MODULE}', activeModule.label + ' — ' + activeModule.desc);

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: sysPrompt,
      messages: history
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    hideTyping();
    var reply = (data.content||[]).map(function(b){return b.text||'';}).join('') || 'Erro ao processar resposta.';
    history.push({role:'assistant', content:reply});
    appendMessage('assistant', reply);
  })
  .catch(function(){
    hideTyping();
    appendMessage('assistant', 'Erro de conexão. Verifique sua internet e tente novamente.');
  });
}
</script>
</body>
</html>
